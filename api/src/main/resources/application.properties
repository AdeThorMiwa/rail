spring.application.name=rail-api
spring.profiles.active=stub

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rail}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — update creates tables+indexes on a fresh DB; Flyway owns schema changes after that
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway — migrations live in db/migration/; write V1__, V2__... for future schema changes
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}

# Server
server.port=8080

# CORS — comma-separated list of allowed origins (set CORS_ALLOWED_ORIGINS in prod)
rail.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# JWT (must be at least 256 bits — set JWT_SECRET env var in production)
rail.jwt.secret=${JWT_SECRET:rail-dev-secret-change-this-in-production-needs-to-be-long-enough-for-hmac}
rail.jwt.expiration-ms=900000
rail.jwt.refresh-expiration-days=30

# Google OAuth
rail.google.client-id=${GOOGLE_CLIENT_ID:}

# LLM debug logs
rail.llm.log-dir=./logs/llm
rail.llm.log-enabled=true
rail.llm.max-json-retries=3

# Scheduling
rail.scheduling.buffer-minutes=10
rail.scheduling.day-start=07:00
rail.scheduling.day-end=22:00
rail.scheduling.model=deepseek-v4-pro
rail.scheduling.wake-trigger-offset-hours=1
rail.scheduling.history-limit=20
rail.scheduling.changes-limit=10
rail.scheduling.cron.build-daily=0 */20 * * * *
rail.scheduling.cron.auto-miss=0 * * * * *
rail.scheduling.stale-generating-minutes=15

# Connie — models
rail.connie.model.default=deepseek-v4-flash
rail.connie.model.refiner=deepseek-v4-pro
rail.connie.model.analyst=deepseek-v4-flash

# Connie — pattern analysis
rail.connie.pattern-analysis.analysis-days=30
rail.connie.pattern-analysis.max-logs=14
rail.connie.pattern-analysis.merge-batch=8
rail.connie.pattern-analysis.context-limit=7
rail.connie.pattern-analysis.analysis-hour=1
rail.connie.pattern-analysis.cron=0 */30 * * * *

# Cycles
rail.cycle.max-days=14
rail.cycle.activation-cron=0 1 0 * * *

# SSE
rail.sse.emitter-timeout-ms=300000
rail.sse.max-emitters-per-user=5

# Rate limiting (Redis-backed, per user)
rail.rate-limit.chat-per-minute=30
rail.rate-limit.recomputes-per-day=3

# DeepSeek (OpenAI-compatible)
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.api-key=${DEEPSEEK_API_KEY:}
spring.ai.openai.chat.options.model=deepseek-v4-pro
